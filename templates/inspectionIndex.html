<!doctype html>
<html lang="ja">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Bootstrap CSS -->
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/sanitize.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/fontawesome-free-5.15.1-web/css/all.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/loading.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/inspection.css' %}">
    <title>{{title}}</title>
  </head>
  <body>
      <div class="container text-center">
        <!-- ローディング画面 -->
        <div class="loading" id="loading_anime">
          <i class="fas fa-circle-notch fa-10x fa-spin" id="loading_spinner"></i>
        </div>
      </div>
      <div class="position-absolute h-100 w-100 d-flex align-items-center justify-content-center bg-light">
        <div class="row">
          <div class="col">
            <div class="card shadow">
              <div class="card-body">
                <h5 class="card-title mb-3">患者ごとに検索</h5>
                <form class="d-flex" method="post" action="{% url 'inspection' %}">{% csrf_token %}
                  <input class="form-control me-2" type="search" placeholder="患者ID" name="pid">
                  <button class="btn btn-outline-primary" type="submit">
                    <i class="fas fa-search"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card shadow">
              <div class="card-body">
                <h5 class="card-title mb-3">カルテワード検索</h5>
                <form class="d-flex" method="post" action="{% url 'word_search' %}">{% csrf_token %}
                  <input class="form-control me-2" type="search" placeholder="検索ワード" name="word">
                  <button class="btn btn-outline-primary" type="submit">
                    <i class="fas fa-search"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

    <script type="text/javascript" src="{% static 'js/jquery-3.5.1.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/original.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/vue.min.js' %}"></script>
  </body>
</html>
