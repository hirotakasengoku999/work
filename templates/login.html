<!doctype html>
<html lang="ja">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/sanitize.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/fontawesome-free-5.15.1-web/css/all.css' %}">

    <title>ログイン!</title>
  </head>
  <body class="text-center">

  	<style type="text/css">
      html,
      body {
        height: 100%;
      }

      body {
        display: -ms-flexbox;
        display: flex;
        -ms-flex-align: center;
        align-items: center;
        padding-top: 40px;
        padding-bottom: 40px;
        background-color: #f5f5f5;
      }

      .form-signin {
        width: 100%;
        max-width: 800px;
        padding: 15px;
        margin: auto;
        background: #fff;
        height: 450px;
        box-shadow: 0 10px 25px 0 #aaa;
        border-radius: 15px;
      }
      .form-signin .form-control {
        position: relative;
        box-sizing: border-box;
        height: auto;
        padding: 10px;
        font-size: 16px;
      }

      .form-control {
        width: 50%;
        margin-left: auto;
        margin-right: auto;
        height: 46px;
      }

      .input_password_group{
        width: 50%;
        margin-right: auto;
        margin-left: auto;
      }

      .input-group-append{
        height: 46px;
      }

      .btn_login {
        width: 50%; 
        margin-left: auto; 
        margin-right: auto;
        margin-top: 2%;
      }

      .form-signin .form-control:focus {
        z-index: 2;
      }

      .form-signin input[type="password"] {
        margin-bottom: 1px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }

      .form-signin input[type="text"] {
        margin-bottom: 1px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }
    </style>

	 <form class="form-signin" method="POST" autocomplete="new-password" action="">{% csrf_token %}
    <img class="mt-5" src="{% static 'icon/aibrain_A@2x.png'%}">
      <p style="color: #FF0000;">{{error}}</p>
      <input type="password" name="dummypass" style="display: none;" /> 
	   <input type="text" id="userid" class="form-control" name="userid" placeholder="利用者ID" required>
      <div class="input-group" style="width: 50%; margin-left: auto; margin-right: auto;">
        <input type="password" id="password" class="form-control" name="password" placeholder="パスワード" required>
        <!-- chrome用 -->
<!--         <div class="input-group-append">
          <span class="input-group-text"><i class="fas fa-eye" id="eye"></i></span>
        </div> -->
      </div>
	  <button class="btn btn-lg btn-primary btn-block btn_login" type="submit">ログイン</button>
    <!-- <button class="btn btn-lg btn-primary btn-block btn_login" onclick="CloseWindow()">閉じる</button> -->
	</form>
	</body>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
    <script type="text/javascript" src="{% static 'js/jquery-3.5.1.js' %}" crossorigin="anonymous"></script>
    <script type="text/javascript" src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
